# LLM モデルルーティング設定
# llm_call Skill が model="auto" で呼ばれた時に参照する

# --- Ollama 共通デフォルト ---
# Phase 0 V1 検証結果: think=true はタイムアウト多発（476 tokens / 31秒）
# think=false で安定動作（14 tokens / 1.1秒, 31.9 tok/s）
ollama_defaults:
  think: false             # Qwen3.5 の extended thinking を無効化（Phase 0 V1 必須判定）
  timeout_seconds: 30      # think=false 前提の安全マージン
  num_ctx: 16384           # OLLAMA_NUM_CTX と一致

# Phase 2 での think=true 例外設定（複雑推論タスク向け、Phase 2 着手前に再検証）
# ollama_overrides_phase2:
#   select_skill:
#     think: true
#     timeout_seconds: 120
#   plan_task:
#     think: true
#     timeout_seconds: 120

routing_rules:
  # --- 明示的ルール（Skill名で直接指定）---
  # 利用可能モデル（2026-04-02確認）:
  #   llama3.1:latest    4.9GB  軽量・高速  評価・抽出系に最適
  #   gemma3:27b        17.4GB  中型・バランス  意思決定・計画に最適
  #   qwen3.5:35b-a3b   23.9GB  高品質（MoE）  品質重視タスクのみ
  explicit:
    select_skill: gemma3:27b          # 意思決定コア（速度と品質のバランス）
    plan_task: gemma3:27b             # 計画立案
    generate_goal: qwen3.5:35b-a3b   # 目標生成（品質重視）
    reflect: llama3.1:latest          # 振り返り（軽量で十分）
    generate_response: qwen3.5:35b-a3b  # キャラクター応答生成（品質重視）
    send_discord: null                # LLM 不使用
    compress_memory: llama3.1:latest  # 記憶圧縮（軽量で十分）
    evaluate_importance: llama3.1:latest  # 重要度評価（軽量・高速）

    # Phase 1 で使用
    store_semantic: llama3.1:latest   # 知識抽出（軽量で十分）

  # --- カテゴリベースのフォールバック ---
  category_default:
    reasoning: qwen3.5:35b-a3b       # 推論は大型モデル
    character: qwen3.5:35b-a3b       # キャラクター応答（品質重視）
    perception: llama3.1:latest      # 関連性判定等（軽量で十分）
    memory: llama3.1:latest          # 知識抽出等（軽量で十分）
    action: null                      # Action Skill は基本的に LLM 不要
    browser: null                     # Browser Skill は LLM 不要

  # --- 最終フォールバック ---
  default: llama3.1:latest

# --- 埋め込みモデル（Phase 0 V2 検証済み）---
# P0-U2 解決: sentence-transformers を FastAPI サーバーとして Docker コンテナ分離
# POST http://embed:8001/embed  {"texts": [...]}  → {"embeddings": [[...]], "dim": 768}
# ローカル直接実行時は http://localhost:8001/embed
embedding_model: "intfloat/multilingual-e5-base"  # Phase 0 V2 検証済み（avg 0.810、768次元）
embedding_server:
  base_url: "http://embed:8001"    # Docker 内からのアクセス（サービス名解決）
  local_url: "http://localhost:8001"  # ホスト直接実行時のフォールバック
  endpoint: "/embed"
  dim: 768
  # 実装: ./embed/Dockerfile + ./embed/server.py（Phase 1 着手時に作成）
