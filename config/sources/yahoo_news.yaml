# Yahoo! ニュース ソースアダプタ
name: yahoo_news
type: browser
url: "https://news.yahoo.co.jp"
stealth_required: false
always_active: true

extraction:
  method: dom_parse
  selectors:
    # 2026-04 時点のDOM構造: .newsFeed_list > li が記事コンテナ
    article_container: ".newsFeed_list > li"
    title: "a[href]"
    url: "a[href]"
    summary: ""  # タイトルに内包されるため省略
  wait_for: "networkidle"  # domcontentloaded ではJS未完了のため networkidle に変更

rate_limit:
  max_per_hour: 2
  min_interval_sec: 1800
  cool_down_on_failure_sec: 120

risk_level: none
tags: [news, japan, always_active]
