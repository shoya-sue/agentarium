# Agentarium メイン設定
# 環境変数で上書き可能（.env 参照）

agent:
  name: "agentarium"
  version: "0.1.0"
  log_level: "${LOG_LEVEL:-INFO}"
  data_dir: "data"
  # AgentLoop で使用するキャラクター名（config/characters/{name}.yaml が必要）
  character_name: "zephyr"
  # AgentLoop サイクル間隔（秒）。短くするほど判断が速くなる
  agent_loop_interval_seconds: 15

ollama:
  base_url: "${OLLAMA_BASE_URL:-http://localhost:11434}"
  default_model: "qwen3.5:35b-a3b"
  embed_model: "nomic-embed-text"  # Phase 0 で選定
  num_ctx: 16384
  timeout_seconds: 300

qdrant:
  host: "${QDRANT_HOST:-localhost}"
  port: "${QDRANT_PORT:-16333}"
  grpc_port: 16334
  collections:
    episodic: "episodic"
    semantic: "semantic"
    procedural: "procedural"   # Phase 2 で追加
    # character: "character"    # Phase 3 で追加

browser:
  remote_url: "${BROWSER_REMOTE_URL:-http://localhost:9222}"
  headless: true
  stealth_config: "config/browser/stealth.yaml"
  screenshot_dir: "data/outputs/screenshots"

characters:
  - "config/characters/zephyr.yaml"
  - "config/characters/lynx.yaml"

schedules:
  patrol: "config/schedules/patrol.yaml"

skills:
  base_path: "config/skills"

safety:
  general: "config/safety.yaml"
  x_platform: "config/safety_x.yaml"

llm:
  routing: "config/llm/routing.yaml"
  context_limits: "config/llm/context_limits.yaml"

discord:
  webhook_url: ""  # 環境変数 DISCORD_WEBHOOK_URL で上書き
  default_username: "Agentarium"
  max_message_length: 2000
  channels:
    general: ""  # 環境変数 DISCORD_CHANNEL_GENERAL で上書き

speech:
  output_dir: "data/outputs/speech"
  # WAV ローテーション設定
  # max_wav_files: 保持するファイル数の上限（古い順に削除）。null = 無制限
  max_wav_files: 100
  # max_wav_age_hours: この時間を超えた WAV を削除（毎回の run() 時に実行）。null = 無制限
  max_wav_age_hours: 24
