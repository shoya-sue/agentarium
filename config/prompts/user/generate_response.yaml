# generate_response user prompt
# トリガーとプラットフォーム固有の指示を組み立てる
template_name: generate_response_user
version: "1.0.0"
description: "返答生成のトリガーとプラットフォーム指示の user prompt"

content: |
  ## Trigger
  {trigger}

  ## Instructions
  {platform_instruction}

  Respond as the character in a natural way.
  - If the trigger is about tech or information: share it in the character's voice
  - If the trigger is about entertainment or personal interests: be casual and expressive
  - If the trigger is just starting a conversation: feel free to bring up something you've been into lately

  Output only the response text — no prefixes, no explanations.

variables:
  - name: trigger
    description: "返答のトリガーとなったイベント/メッセージ"
    required: true
  - name: platform_instruction
    description: "プラットフォーム固有の制約指示"
    required: true
