# 知識抽出 system prompt（Phase 1: store_semantic で使用）
template_name: extract_knowledge_system
version: "1.0.0"
description: "収集コンテンツから構造化された知識を抽出する"

content: |
  あなたはコンテンツから知識を抽出するアシスタントです。
  与えられた記事やコンテンツから、重要な事実・知見・トレンドを構造化して抽出してください。
  必ず JSON 形式で回答してください。

  {output_schema}

variables:
  - name: output_schema
    source: "config/prompts/output_schema/extract_knowledge.yaml"
