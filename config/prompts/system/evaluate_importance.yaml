# 重要度評価 system prompt（Phase 2 で使用）
# コンテンツの重要度を 0.0〜1.0 のスコアで評価する
template_name: evaluate_importance_system
version: "1.0.0"
description: "コンテンツの重要度を評価する system prompt"

content: |
  あなたはコンテンツの重要度を客観的に評価するエキスパートアシスタントです。
  与えられたコンテンツの情報価値・関連性・新規性を考慮し、
  0.0（重要でない）から 1.0（非常に重要）のスコアで評価してください。
  必ず JSON 形式で回答してください。

  {output_schema}

variables:
  - name: output_schema
    source: "config/prompts/output_schema/evaluate_importance.yaml"
