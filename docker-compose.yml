services:
  # multilingual-e5-base 埋め込みサーバー
  # Phase 0 V2 検証結果: Ollama nomic-embed-text は日英クロスリンガル不合格
  # → sentence-transformers ベースの FastAPI サーバーとして分離（P0-U2 解決）
  # API: POST http://localhost:8001/embed {"texts": [...]} → {"embeddings": [[...]], "dim": 768}
  embed:
    build:
      context: ./embed
      dockerfile: Dockerfile
    container_name: agentarium-embed
    ports:
      - "8001:8001"
    environment:
      - MODEL_NAME=intfloat/multilingual-e5-base
      - PORT=8001
    volumes:
      - embed_model_cache:/root/.cache/huggingface
    restart: unless-stopped
    # ビルド前に ./embed/ ディレクトリを作成すること
    # Phase 1 着手時に実装: ./embed/Dockerfile + ./embed/server.py

  # Qdrant ベクトルDB
  qdrant:
    image: qdrant/qdrant:latest
    container_name: agentarium-qdrant
    ports:
      - "16333:6333"
      - "16334:6334"
    volumes:
      - ./data/qdrant:/qdrant/storage
    restart: unless-stopped

  # Playwright Stealth ブラウザ（CDP リモートデバッグ）
  browser:
    image: mcr.microsoft.com/playwright:v1.48.0-jammy
    container_name: agentarium-browser
    ports:
      - "9222:9222"   # CDP（Chrome DevTools Protocol）
      # 5900: VNC は x11vnc がイメージに含まれないため無効化（Phase 1 以降に別途対応）
    environment:
      - DISPLAY=:99
    volumes:
      - ./data/browser-profile:/browser-profile
    command:
      - bash
      - -c
      - |
        Xvfb :99 -screen 0 1280x720x24 &
        sleep 1
        rm -f /browser-profile/SingletonLock /browser-profile/SingletonSocket /browser-profile/SingletonCookie 2>/dev/null || true
        CHROME=$$(find /ms-playwright -name chrome -maxdepth 4 -type f | head -1)
        DISPLAY=:99 "$$CHROME" \
          --remote-debugging-port=9223 \
          --remote-allow-origins=* \
          --no-sandbox \
          --disable-setuid-sandbox \
          --disable-dev-shm-usage \
          --disable-gpu \
          --no-zygote \
          --disable-blink-features=AutomationControlled \
          --user-data-dir=/browser-profile &
        sleep 3
        exec node -e "
          const http=require('http'),net=require('net');
          const s=http.createServer((req,res)=>{
            const h=(req.headers.host||'browser').split(':')[0];
            const o={hostname:'127.0.0.1',port:9223,path:req.url,method:req.method,headers:{...req.headers,host:'127.0.0.1:9223'}};
            const p=http.request(o,r=>{
              let b='';
              r.on('data',d=>b+=d.toString());
              r.on('end',()=>{
                const rb=b.replace(/127\\.0\\.0\\.1:9223/g,h+':9222');
                const nh={...r.headers,'content-length':Buffer.byteLength(rb).toString()};
                res.writeHead(r.statusCode,nh);res.end(rb);
              });
            });
            req.pipe(p);p.on('error',e=>res.end());
          });
          s.on('upgrade',(req,sock,head)=>{
            const c=net.connect(9223,'127.0.0.1',()=>{
              const hd=Object.entries({...req.headers,host:'127.0.0.1:9223'}).map(([k,v])=>k+': '+v).join('\r\n');
              c.write(req.method+' '+req.url+' HTTP/'+req.httpVersion+'\r\n'+hd+'\r\n\r\n');
              if(head.length)c.write(head);
            });
            sock.pipe(c);c.pipe(sock);
            sock.on('error',()=>c.destroy());c.on('error',()=>sock.destroy());
          });
          s.listen(9222,'0.0.0.0',()=>console.log('CDP proxy ready on 0.0.0.0:9222'));"
    restart: unless-stopped

  # Agent Core（Python 3.12 自律 Agent 本体）
  agent-core:
    build:
      context: ./agent-core
      dockerfile: Dockerfile
    container_name: agentarium-agent-core
    depends_on:
      - qdrant
      - embed
      - browser
      - neo4j
      - voicevox
    environment:
      - QDRANT_URL=http://qdrant:6333
      - EMBED_URL=http://embed:8001
      - BROWSER_REMOTE_URL=http://browser:9222
      - OLLAMA_URL=${OLLAMA_URL:-http://host.docker.internal:11434}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - DISCORD_WEBHOOK_URL=${DISCORD_WEBHOOK_URL:-}
      - DISCORD_CHANNEL_GENERAL=${DISCORD_CHANNEL_GENERAL:-}
      - ENABLE_AGENT_LOOP=${ENABLE_AGENT_LOOP:-false}
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=${NEO4J_USER:-neo4j}
      - NEO4J_PASSWORD=${NEO4J_PASSWORD:-agentarium}
      - VOICEVOX_URL=http://voicevox:50021
    volumes:
      - ./config:/app/config:ro          # 設定ファイル（読み取り専用）
      - ./data:/app/data                 # 出力データ（読み書き）
      - ./data/browser-profile:/app/data/browser-profile  # Cookie / セッション
    restart: unless-stopped
    # ホスト上の Ollama / MLX に接続するため extra_hosts が必要（Linux 環境）
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # Neo4j グラフDB（Phase 4: GraphRAG）
  neo4j:
    image: neo4j:5
    container_name: agentarium-neo4j
    ports:
      - "7474:7474"   # Neo4j Browser UI
      - "7687:7687"   # Bolt プロトコル
    environment:
      - NEO4J_AUTH=neo4j/agentarium
    volumes:
      - ./data/neo4j:/data
    restart: unless-stopped

  # AivisSpeech 音声合成エンジン（Phase 4: TTS）
  # VOICEVOX 互換 API / Style-Bert-VITS2 ベースで高品質な日本語音声合成
  # Phase 5 で Style-Bert-VITS2 ネイティブ統合予定（D14）
  voicevox:
    image: ghcr.io/aivis-project/aivisspeech-engine:cpu-latest
    container_name: agentarium-voicevox
    ports:
      - "50021:10101"   # AivisSpeech 内部ポートは 10101（VOICEVOX の 50021 とは異なる）
    restart: unless-stopped

  # 監視ダッシュボード（Phase 4a）
  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    container_name: agentarium-dashboard
    ports:
      - "8080:8080"
    volumes:
      - ./data:/app/data:ro
      - ./config:/app/config:ro
    environment:
      - QDRANT_URL=http://qdrant:6333
      - DATA_DIR=/app/data
      - CONFIG_DIR=/app/config
      - PORT=8080
    depends_on:
      - qdrant
    restart: unless-stopped

volumes:
  qdrant_data:
  embed_model_cache:   # multilingual-e5-base モデルキャッシュ（初回DL後は再利用）
